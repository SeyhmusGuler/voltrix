name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


on:
  push:
    branches-ignore:
      - trunk
  pull_request:
    branches:
      - trunk
    types:
      - opened
      - reopened
      - ready_for_review


jobs:
  test:

    # runs-on: ["self-hosted", "Deb13"]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.13"]

