name: CD

on:
  push:
    branches: [ trunk ]
    tags:
      - 'v*'
  pull_request:
    branches: [ trunk ]

jobs:
  build-test-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install uv and Python 3.13
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'

      - name: Install project dependencies
        run: |
          uv pip install --upgrade pip
          uv pip install -e .[dev]

      - name: Lint
        run: uv pip install flake8 && flake8 src tests

      - name: Run tests
        run: uv pip install pytest && pytest --maxfail=1 --disable-warnings -q

      - name: Build package
        run: uv pip install build && python -m build --sdist --wheel --outdir dist

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/') && github.ref_protected == true
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv pip install twine
          python -m twine upload dist/*
